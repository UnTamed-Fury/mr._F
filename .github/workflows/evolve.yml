name: Evolve Code

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if no changes'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
      
      - name: Configure Git
        run: |
          git config --global user.name "Mr. F Bot"
          git config --global user.email "mr-f-bot@users.noreply.github.com"
      
      - name: Run Evolution Step
        id: evolve
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          cd ${{ github.workspace }}
          python core/runner.py
          echo "exit_code=$?" >> $GITHUB_OUTPUT
      
      - name: Check for changes
        id: git-check
        run: |
          cd ${{ github.workspace }}
          git add -A
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push if improved
        if: steps.git-check.outputs.has_changes == 'true' && steps.evolve.outputs.exit_code == '0'
        run: |
          cd ${{ github.workspace }}
          git add -A
          git commit -m "[Mr. F] Auto-evolve: Code improvement attempt
          
          Model: GPT-5.2 | Mode: Normal
          Run: ${{ github.run_number }}
          
          Changes:
          - Updated workspace code
          - Updated memory files
          - Updated run artifacts"
          git push
      
      - name: Archive run (every 100 runs)
        if: ${{ github.run_number % 100 == 0 }}
        run: |
          cd ${{ github.workspace }}
          mkdir -p runs/archive/run-${{ github.run_number }}
          cp -r runs/latest/* runs/archive/run-${{ github.run_number }}/ || true
      
      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evolution-run-${{ github.run_number }}
          path: |
            runs/latest/
            memory/journal.jsonl
          retention-days: 7
      
      - name: Report status
        if: always()
        run: |
          if [ "${{ steps.evolve.outputs.exit_code }}" == "0" ]; then
            echo "✅ Evolution step completed successfully"
          else
            echo "❌ Evolution step completed without improvement"
          fi
